<!DOCTYPE html>
<html lang="fr" data-theme="ivory">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="description" content="TERLAB — Accueil · Gestion des projets terrain · ENSA La Réunion"/>
<title>TERLAB · Accueil · ENSA La Réunion</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=Inconsolata:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<!-- TERLAB CSS -->
<link rel="stylesheet" href="assets/terlab-shell.css"/>
<link rel="stylesheet" href="assets/terlab-v2-additions.css"/>

<style>
/* ── Accueil-specific styles ─────────────────────────────── */
html, body { overflow: auto; }

/* ── Rain animation (from GIEP) ───────────────────────────── */
.rain-layer{
  position:fixed; inset:0;
  pointer-events:none; z-index:1; overflow:hidden;
}
.raindrop{
  position:absolute; top:-12vh;
  left:calc(var(--x) * 1vw);
  width:1px; height:var(--h);
  background:linear-gradient(to bottom,rgba(154,120,32,.5),rgba(154,120,32,0));
  transform:translateY(-12vh);
  animation:fall var(--d) linear var(--delay) infinite;
  opacity:var(--alpha,.1);
  filter:blur(.2px);
}
@keyframes fall{
  0%   { transform:translateY(-12vh); opacity:0; }
  6%   { opacity:var(--alpha,.1); }
  85%  { transform:translateY(100vh); }
  100% { transform:translateY(100vh); opacity:0; }
}
@media(prefers-reduced-motion:reduce){ .rain-layer{display:none;} }

.accueil-app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  background: var(--bg);
}

.accueil-header {
  text-align: center;
  margin-bottom: 40px;
}
.accueil-logo {
  width: 56px;
  height: 56px;
  margin: 0 auto 16px;
}
.accueil-title {
  font-family: var(--font-serif);
  font-size: 2rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.08em;
}
.accueil-sub {
  font-family: var(--font-body);
  font-size: 1rem;
  color: var(--muted);
  margin-top: 4px;
}
.accueil-ensa {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--faint);
  margin-top: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* ── Formulaire étudiant ─────────────────────────────────── */
.accueil-form {
  width: 100%;
  max-width: 520px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 32px;
}
.accueil-form-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 16px;
}
.accueil-field {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.accueil-field label {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text2);
  min-width: 80px;
  text-align: right;
}
.accueil-field input,
.accueil-field select {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.2s;
}
.accueil-field input:focus,
.accueil-field select:focus {
  border-color: var(--accent);
}
.accueil-field input::placeholder {
  color: var(--faint);
}

/* ── Grille projets ──────────────────────────────────────── */
.accueil-projects {
  width: 100%;
  max-width: 720px;
}
.accueil-projects-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 16px;
}
.accueil-projects-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.accueil-projects-count {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--faint);
}
.accueil-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  position: relative;
}
.project-card:hover {
  border-color: var(--accent);
  box-shadow: var(--sh);
  transform: translateY(-2px);
}
.project-card-new {
  border-style: dashed;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 220px;
  color: var(--muted);
}
.project-card-new:hover {
  color: var(--accent);
  border-color: var(--accent);
}
.project-card-new.pc-disabled {
  opacity: 0.4;
  pointer-events: none;
}
.pc-new-icon {
  font-size: 1.8rem;
  margin-bottom: 8px;
}
.pc-new-label {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.pc-new-limit {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--faint);
  margin-top: 6px;
}

/* ── Thumbnail ──────────────────────────────────────────── */
.pc-thumb {
  width: 100%;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.pc-thumb-initials {
  font-family: var(--font-serif);
  font-size: 1.8rem;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.pc-thumb-pattern {
  position: absolute;
  inset: 0;
  opacity: 0.12;
  background-image:
    repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,.15) 8px, rgba(255,255,255,.15) 9px);
}
.pc-thumb-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  border-radius: 0 2px 0 0;
  transition: width 0.4s ease;
}

/* ── Card body ──────────────────────────────────────────── */
.pc-body {
  padding: 12px 14px 14px;
}
.pc-loc {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--accent);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pc-name {
  font-family: var(--font-serif);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pc-meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--faint);
  margin-bottom: 8px;
}
.pc-actions {
  display: flex;
  gap: 6px;
}
.pc-btn {
  flex: 1;
  padding: 5px 8px;
  border: 1px solid var(--border2);
  border-radius: 4px;
  background: var(--card);
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  cursor: pointer;
  text-align: center;
  transition: background 0.2s, color 0.2s;
}
.pc-btn:hover {
  background: var(--accent);
  color: var(--bg);
}
.pc-btn-danger:hover {
  background: var(--danger);
  color: #fff;
}

/* ── Modal de confirmation ──────────────────────────────── */
.tl-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.tl-modal-overlay.tl-modal-visible {
  opacity: 1;
  pointer-events: auto;
}
.tl-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 28px 32px 24px;
  max-width: 380px;
  width: 90%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  transform: scale(0.95);
  transition: transform 0.2s;
}
.tl-modal-visible .tl-modal {
  transform: scale(1);
}
.tl-modal-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(180,60,60,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  font-size: 1.2rem;
}
.tl-modal-title {
  font-family: var(--font-serif);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.tl-modal-msg {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--text2);
  line-height: 1.5;
  margin-bottom: 20px;
}
.tl-modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.tl-modal-btn {
  padding: 8px 18px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.tl-modal-btn-cancel {
  background: var(--card);
  color: var(--text2);
}
.tl-modal-btn-cancel:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.tl-modal-btn-danger {
  background: var(--danger, #b43c3c);
  color: #fff;
  border-color: transparent;
}
.tl-modal-btn-danger:hover {
  background: #932f2f;
}

/* ── Barre basse ─────────────────────────────────────────── */
.accueil-footer {
  display: flex;
  gap: 10px;
  margin-top: 24px;
  flex-wrap: wrap;
  justify-content: center;
}
.accueil-footer-btn {
  padding: 8px 16px;
  border: 1px solid var(--border2);
  border-radius: 4px;
  background: var(--card);
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  cursor: pointer;
  transition: border-color 0.2s;
}
.accueil-footer-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.accueil-empty {
  text-align: center;
  padding: 24px;
  color: var(--faint);
  font-style: italic;
  font-family: var(--font-body);
  grid-column: 1 / -1;
}
</style>
</head>
<body>

<div class="rain-layer" aria-hidden="true"></div>

<div class="accueil-app">

  <!-- En-tête -->
  <header class="accueil-header">
    <svg class="accueil-logo" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" stroke="#9a7820" stroke-width="1.5" stroke-linejoin="round"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96" stroke="#9a7820" stroke-width="1.2" opacity=".5"/>
      <line x1="12" y1="22.08" x2="12" y2="12" stroke="#9a7820" stroke-width="1.2" opacity=".5"/>
    </svg>
    <h1 class="accueil-title">TERLAB</h1>
    <p class="accueil-sub">Laboratoire d'analyse de terrain</p>
    <p class="accueil-ensa">ENSA La Réunion · Île de La Réunion</p>
  </header>

  <!-- Formulaire étudiant -->
  <section class="accueil-form" id="accueil-form">
    <div class="accueil-form-title">Identification</div>
    <div class="accueil-field">
      <label for="input-prenom">Prénom</label>
      <input type="text" id="input-prenom" placeholder="Votre prénom" autocomplete="given-name" maxlength="40"/>
    </div>
    <div class="accueil-field">
      <label for="input-annee">Année</label>
      <select id="input-annee">
        <option value="M1" selected>Master 1 Architecture</option>
        <option value="M2">Master 2 Architecture</option>
        <option value="L3">Licence 3</option>
        <option value="autre">Autre</option>
      </select>
    </div>
    <div class="accueil-field">
      <label for="input-groupe">Groupe</label>
      <select id="input-groupe">
        <option value="" selected>—</option>
        <option value="A">Groupe A</option>
        <option value="B">Groupe B</option>
        <option value="C">Groupe C</option>
        <option value="D">Groupe D</option>
      </select>
    </div>
  </section>

  <!-- Projets existants -->
  <section class="accueil-projects">
    <div class="accueil-projects-header">
      <div class="accueil-projects-title">Mes projets terrains</div>
      <div class="accueil-projects-count" id="projects-count"></div>
    </div>
    <div class="accueil-grid" id="accueil-grid">
      <!-- Rempli dynamiquement -->
    </div>
  </section>

  <!-- Modal de confirmation suppression -->
  <div class="tl-modal-overlay" id="delete-modal">
    <div class="tl-modal">
      <div class="tl-modal-icon">🗑</div>
      <div class="tl-modal-title">Supprimer ce projet ?</div>
      <div class="tl-modal-msg" id="delete-modal-msg">
        Cette action est irréversible. Toutes les données de ce terrain seront perdues.
      </div>
      <div class="tl-modal-actions">
        <button class="tl-modal-btn tl-modal-btn-cancel" id="delete-modal-cancel">Annuler</button>
        <button class="tl-modal-btn tl-modal-btn-danger" id="delete-modal-confirm">Supprimer</button>
      </div>
    </div>
  </div>

  <!-- Actions basses -->
  <footer class="accueil-footer">
    <button class="accueil-footer-btn" id="btn-import" title="Importer un fichier .terlab">
      Importer session .terlab
    </button>
    <button class="accueil-footer-btn" id="btn-demo" title="Lancer en mode démonstration sans sauvegarder">
      Mode démonstration
    </button>
  </footer>

  <!-- Input file caché pour import -->
  <input type="file" id="file-import" accept=".terlab,.json" hidden/>

</div>

<script type="module">
import TerlabStorage from './components/terlab-storage.js';

// ── État ────────────────────────────────────────────────────
const PREFS_KEY   = 'terlab_accueil_prefs';
const MAX_PROJETS = 8;

function loadPrefs() {
  try {
    return JSON.parse(localStorage.getItem(PREFS_KEY)) ?? {};
  } catch { return {}; }
}

function savePrefs() {
  const prefs = {
    etudiant: document.getElementById('input-prenom').value.trim(),
    annee: document.getElementById('input-annee').value,
    groupe: document.getElementById('input-groupe').value
  };
  localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
  return prefs;
}

// ── Thumbnails ─────────────────────────────────────────────
// Palette de couleurs terrain (géologie / topographie)
const THUMB_COLORS = [
  ['#5b7553','#3d5a3a'], ['#6b5b4a','#4a3d32'], ['#4a6670','#2d4a54'],
  ['#7a6b3a','#5a4d28'], ['#6a4a5a','#4d3344'], ['#3a6b5b','#285a4a'],
  ['#7a5a3a','#5a3d28'], ['#4a5a7a','#2d3d5a']
];

function thumbColor(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = ((h << 5) - h + id.charCodeAt(i)) | 0;
  return THUMB_COLORS[Math.abs(h) % THUMB_COLORS.length];
}

function thumbInitials(s) {
  // Parcelle / section disponible → initiales
  const parcelle = s.terrain?.parcelle || s.terrain?.section;
  if (parcelle) return parcelle.slice(0, 2).toUpperCase();
  // Commune → initiales
  if (s.terrain?.commune) {
    const words = s.terrain.commune.split(/[\s-]+/);
    if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
    return s.terrain.commune.slice(0, 2).toUpperCase();
  }
  // Nom projet ou étudiant
  if (s.nom) return s.nom.slice(0, 2).toUpperCase();
  if (s.etudiant) return s.etudiant.slice(0, 2).toUpperCase();
  return 'T' + (s.createdAt ? new Date(s.createdAt).getDate() : '?');
}

// ── Nom affiché (jamais vide) ──────────────────────────────
function projectDisplayName(s) {
  // 1) Nom explicite donné par l'utilisateur
  if (s.nom) return s.nom;
  // 2) Parcelle + section
  const parcelle = s.terrain?.parcelle;
  const section  = s.terrain?.section;
  if (parcelle && section) return `${section} · ${parcelle}`;
  if (parcelle) return parcelle;
  if (section)  return `Section ${section}`;
  // 3) Adresse / lieu-dit
  if (s.terrain?.adresse) return s.terrain.adresse;
  if (s.terrain?.lieuDit) return s.terrain.lieuDit;
  // 4) Commune seule
  if (s.terrain?.commune) return `Terrain ${s.terrain.commune}`;
  // 5) Étudiant + date
  const d = s.createdAt ? new Date(s.createdAt) : new Date();
  const dateStr = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
  if (s.etudiant) return `${s.etudiant} · ${dateStr}`;
  // 6) Dernier recours
  return `Projet du ${dateStr}`;
}

// ── Rendu grille ────────────────────────────────────────────
function render() {
  const grid = document.getElementById('accueil-grid');
  const sessions = TerlabStorage.listSessions();
  const atLimit = sessions.length >= MAX_PROJETS;

  // Compteur
  document.getElementById('projects-count').textContent =
    `${sessions.length} / ${MAX_PROJETS}`;

  let html = '';

  // Carte "Nouveau terrain"
  html += `
    <div class="project-card project-card-new ${atLimit ? 'pc-disabled' : ''}"
         id="card-new" tabindex="0" role="button"
         aria-label="Créer un nouveau projet terrain">
      <div class="pc-new-icon">+</div>
      <div class="pc-new-label">Nouveau terrain</div>
      ${atLimit ? '<div class="pc-new-limit">Maximum 8 projets atteint</div>' : ''}
    </div>`;

  // Sessions existantes
  for (const s of sessions) {
    const commune = s.terrain?.commune || '';
    const name    = projectDisplayName(s);
    const pct     = s.completion ?? TerlabStorage._computeCompletion(s);
    const col     = pct < 30 ? 'var(--danger)' : pct < 60 ? 'var(--warning)' : 'var(--success)';
    const ago     = timeAgo(s.updatedAt);
    const [bg1, bg2] = thumbColor(s.id);
    const initials = thumbInitials(s);

    html += `
    <div class="project-card" data-id="${s.id}" tabindex="0" role="button" aria-label="Ouvrir ${name}">
      <div class="pc-thumb" style="background:linear-gradient(135deg,${bg1},${bg2})">
        <div class="pc-thumb-pattern"></div>
        <span class="pc-thumb-initials">${initials}</span>
        <div class="pc-thumb-progress" style="width:${pct}%;background:${col}"></div>
      </div>
      <div class="pc-body">
        ${commune ? `<div class="pc-loc">${commune}</div>` : ''}
        <div class="pc-name" title="${name}">${name}</div>
        <div class="pc-meta">
          <span>${pct}%</span>
          <span>${ago}</span>
        </div>
        <div class="pc-actions">
          <button class="pc-btn pc-btn-open" data-id="${s.id}">Continuer</button>
          <button class="pc-btn pc-btn-export" data-id="${s.id}" title="Exporter .terlab">Export</button>
          <button class="pc-btn pc-btn-danger pc-btn-delete" data-id="${s.id}" title="Supprimer">✕</button>
        </div>
      </div>
    </div>`;
  }

  if (sessions.length === 0) {
    html += `<div class="accueil-empty">Aucun projet terrain. Créez-en un pour commencer.</div>`;
  }

  grid.innerHTML = html;
  attachEvents();
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'À l\'instant';
  if (mins < 60) return `Il y a ${mins} min`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `Il y a ${hours}h`;
  const days = Math.floor(hours / 24);
  if (days === 1) return 'Hier';
  if (days < 7) return `Il y a ${days}j`;
  return new Date(dateStr).toLocaleDateString('fr-FR');
}

// ── Modal de confirmation ──────────────────────────────────
let _deleteResolve = null;

function showDeleteModal(projectName) {
  const overlay = document.getElementById('delete-modal');
  document.getElementById('delete-modal-msg').innerHTML =
    `Le projet <strong>${projectName}</strong> sera supprimé définitivement.<br>Cette action est irréversible.`;
  overlay.classList.add('tl-modal-visible');
  return new Promise(resolve => { _deleteResolve = resolve; });
}

function hideDeleteModal(result) {
  document.getElementById('delete-modal').classList.remove('tl-modal-visible');
  if (_deleteResolve) { _deleteResolve(result); _deleteResolve = null; }
}

document.getElementById('delete-modal-cancel')?.addEventListener('click', () => hideDeleteModal(false));
document.getElementById('delete-modal-confirm')?.addEventListener('click', () => hideDeleteModal(true));
document.getElementById('delete-modal')?.addEventListener('click', (e) => {
  if (e.target === e.currentTarget) hideDeleteModal(false);
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && _deleteResolve) hideDeleteModal(false);
});

// ── Événements ──────────────────────────────────────────────
function attachEvents() {
  // Nouveau terrain
  document.getElementById('card-new')?.addEventListener('click', createNew);

  // Ouvrir session
  document.querySelectorAll('.pc-btn-open').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openSession(btn.dataset.id);
    });
  });

  // Clic sur la carte entière
  document.querySelectorAll('.project-card[data-id]').forEach(card => {
    card.addEventListener('click', () => openSession(card.dataset.id));
  });

  // Export
  document.querySelectorAll('.pc-btn-export').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      TerlabStorage.export(btn.dataset.id);
    });
  });

  // Supprimer — modal TERLAB
  document.querySelectorAll('.pc-btn-delete').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const sess = TerlabStorage.getSession(btn.dataset.id);
      const name = sess ? projectDisplayName(sess) : 'ce projet';
      const confirmed = await showDeleteModal(name);
      if (confirmed) {
        TerlabStorage.deleteSession(btn.dataset.id);
        render();
      }
    });
  });
}

function createNew() {
  const sessions = TerlabStorage.listSessions();
  if (sessions.length >= MAX_PROJETS) return;

  const prefs = savePrefs();
  if (!prefs.etudiant) {
    document.getElementById('input-prenom').focus();
    document.getElementById('input-prenom').style.borderColor = 'var(--warning)';
    setTimeout(() => {
      document.getElementById('input-prenom').style.borderColor = '';
    }, 2000);
    return;
  }
  const sess = TerlabStorage.createSession(prefs);
  openSession(sess.id);
}

function openSession(id) {
  savePrefs();
  window.location.href = `index.html?session=${id}`;
}

// ── Import .terlab ──────────────────────────────────────────
document.getElementById('btn-import')?.addEventListener('click', () => {
  const sessions = TerlabStorage.listSessions();
  if (sessions.length >= MAX_PROJETS) {
    showDeleteModal('import impossible — maximum 8 projets atteint');
    return;
  }
  document.getElementById('file-import').click();
});

document.getElementById('file-import')?.addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  try {
    const sess = await TerlabStorage.import(file);
    openSession(sess.id);
  } catch (err) {
    alert('Erreur d\'import : ' + err.message);
  }
});

// ── Mode démo ───────────────────────────────────────────────
document.getElementById('btn-demo')?.addEventListener('click', () => {
  window.location.href = 'index.html?demo=1';
});

// ── Init ────────────────────────────────────────────────────
const prefs = loadPrefs();
if (prefs.etudiant) document.getElementById('input-prenom').value = prefs.etudiant;
if (prefs.annee)    document.getElementById('input-annee').value = prefs.annee;
if (prefs.groupe)   document.getElementById('input-groupe').value = prefs.groupe;

// Auto-save prefs on change
['input-prenom', 'input-annee', 'input-groupe'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', savePrefs);
  document.getElementById(id)?.addEventListener('input', savePrefs);
});

render();
</script>

<!-- Rain animation -->
<script>
(function(){
  const layer = document.querySelector('.rain-layer');
  if(!layer || window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;

  const COUNT=70, MIN_D=2.4, MAX_D=4.0, MIN_H=10, MAX_H=22;
  const drops=[];

  for(let i=0;i<COUNT;i++){
    const d=document.createElement('span');
    d.className='raindrop';
    const x=Math.random()*100;
    const dur=(MIN_D+Math.random()*(MAX_D-MIN_D)).toFixed(2)+'s';
    const h=(MIN_H+Math.random()*(MAX_H-MIN_H)).toFixed(0)+'px';
    const delay=(-Math.random()*parseFloat(dur)).toFixed(2)+'s';
    d.style.setProperty('--x',x);
    d.style.setProperty('--d',dur);
    d.style.setProperty('--h',h);
    d.style.setProperty('--delay',delay);
    layer.appendChild(d);
    drops.push({el:d,x});
  }

  // Balayage d'intensité gaussien
  let sweep=-20;
  const speed=0.2, sigma=10;
  function tick(){
    sweep+=speed;
    if(sweep>120) sweep=-20;
    for(const d of drops){
      const dx=d.x-sweep;
      const a=Math.exp(-(dx*dx)/(2*sigma*sigma));
      d.el.style.setProperty('--alpha',(0.05+0.95*a).toFixed(3));
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
